name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Common base flags. Per-job CFLAGS append -std=c11 plus any extras
# (sanitizers, -Wpedantic, etc.). POSIX feature macros and -DSONICSV_IMPLEMENTATION
# are already added by the project Makefile, so jobs only need the bits that
# vary across configurations.
env:
  BASE_CFLAGS: "-O3 -Wall -Wextra"

jobs:
  linux:
    name: Linux (${{ matrix.cc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v4
      - name: Build & test
        run: make test CC=${{ matrix.cc }} CFLAGS="-std=c11 $BASE_CFLAGS"

  linux-sanitizers:
    name: Linux sanitizers (clang)
    runs-on: ubuntu-latest
    env:
      ASAN_OPTIONS: detect_leaks=1
      UBSAN_OPTIONS: print_stacktrace=1
    steps:
      - uses: actions/checkout@v4
      - name: Build & test with ASan/UBSan
        run: make test CC=clang CFLAGS="-std=c11 -O1 -g -Wall -Wextra -fsanitize=address,undefined -fno-omit-frame-pointer"

  rocky:
    name: Rocky Linux 9 (gcc)
    runs-on: ubuntu-latest
    container: rockylinux:9
    steps:
      - name: Install toolchain
        run: dnf install -y --allowerasing gcc make git tar gzip findutils coreutils which
      - uses: actions/checkout@v4
      - name: Build & test
        run: make test CFLAGS="-std=c11 $BASE_CFLAGS"

  macos:
    name: macOS (clang)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & test
        run: make test CC=clang CFLAGS="-std=c11 $BASE_CFLAGS"

  windows-msvc:
    name: Windows (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Build & run C tests
        shell: cmd
        run: |
          cl /nologo /std:c11 /O2 /W3 /DSONICSV_IMPLEMENTATION /I. tests/sonicsv_test.c /Fe:sonicsv_test.exe
          sonicsv_test.exe
